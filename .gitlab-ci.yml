#build-step
stages:
  - build
  - deploy

build-job:
  stage: build
  image: node:latest
  script:
    - npm i
    - npm run build
  artifacts:
    paths:
      - dist
    

pages:
  stage: deploy
  dependencies:
    - build-job
  script:
    - mkdir -p public
    - cp -r dist/* public
  artifacts:
    paths:
      - public